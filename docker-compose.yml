services:
  postgres:
    image: postgres:16
    container_name: inventory_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: inventory_adminer
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: